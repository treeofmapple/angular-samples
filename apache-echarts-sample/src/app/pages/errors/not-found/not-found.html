<div class="min-h-screen bg-gray-50 flex flex-col justify-center items-center px-6">
  <div class="max-w-md w-full text-center">
    <p class="text-6xl font-extrabold text-blue-600">404</p>
    <h1 class="mt-4 text-3xl font-bold tracking-tight text-gray-900 sm:text-5xl">{{ locale.error().notFoundMessage1 }}</h1>
    <p class="mt-6 text-base leading-7 text-gray-600">
      {{ locale.error().notFoundMessage2 }}
    </p>

    <div class="mt-10 flex items-center justify-center gap-x-6">
      <a
        [routerLink]="['/home']"
        class="rounded-md bg-blue-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 transition-colors"
      >
        {{ locale.error().returnMessage }}
      </a>
    </div>
  </div>
</div>
