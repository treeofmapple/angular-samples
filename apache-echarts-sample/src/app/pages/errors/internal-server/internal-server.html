<div class="flex min-h-screen items-center justify-center bg-gray-50 px-6 py-12">
  <div class="text-center">
    <h1 class="text-9xl font-black text-gray-200">500</h1>

    <div class="relative -mt-16">
      <h2 class="text-2xl font-bold tracking-tight text-gray-900 sm:text-4xl">
        {{ locale.error().internalError }}
      </h2>

      <p class="mt-4 text-gray-500">
        {{ locale.error().internalMessage1 }}
        <br class="hidden sm:block" />
        {{ locale.error().internalMessage2 }}
      </p>

      <a
        [routerLink]="['/']"
        class="mt-6 inline-block rounded bg-indigo-600 px-5 py-3 text-sm font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring focus:ring-indigo-300 transition-colors"
      >
        {{ locale.error().returnMessage }}
      </a>
    </div>
  </div>
</div>
