<div class="min-h-screen bg-gray-50 flex flex-col justify-center items-center px-6">
  <div class="max-w-md w-full text-center space-y-6">
    <div class="mx-auto flex items-center justify-center h-24 w-24 rounded-full bg-orange-100 mb-6">
      <svg class="h-12 w-12 text-orange-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
    </div>

    <h1 class="text-4xl font-bold text-gray-900 tracking-tight">
      {{ locale.error().tooMuchRequestsMessage1 }}
    </h1>
    <p class="text-lg text-gray-600">{{ locale.error().tooMuchRequestsMessage2 }}</p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center mt-8">
      <button
        (click)="reloadPage()"
        class="inline-flex items-center justify-center px-5 py-3 border border-transparent text-base font-medium rounded-md text-white bg-orange-600 hover:bg-orange-700 transition-colors"
      >
        {{ locale.error().tryAgainMessage }}
      </button>

      <a
        [routerLink]="['/']"
        class="inline-flex items-center justify-center px-5 py-3 border border-gray-300 text-base font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 transition-colors"
      >
        {{ locale.error().returnMessage }}
      </a>
    </div>
  </div>
</div>
