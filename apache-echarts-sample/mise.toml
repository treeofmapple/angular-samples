[tools]
node = "22"
rust = "1.91"

[tasks.rust_add]
dir = "data_gen"
run = "cargo add"

[tasks.rust_clean]
dir = "data_gen"
run = "cargo clean"

[tasks.rust_build]
dir = "data_gen"
run = "cargo build"

[tasks.rust_run]
dir = "data_gen"
run = "cargo run"

[tasks.run]
run = "bun run start"

[tasks.install]
run = "bun install"
